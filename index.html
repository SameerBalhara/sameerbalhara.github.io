<!DOCTYPE html>
<html>
<head>
<title>Sameer's Software Portfolio</title>

<style>
body {
    font-family: Arial;
    background: #ebe5d8;
    color: black;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

img {
    width: 100%;
    border-radius: 12px;
    display: block;
    margin-top: 20px;
}

iframe {
    width: 100%;
    height: 400px;
    border: none;
    border-radius: 12px;
    margin-top: 20px;
}

.post {
    position: relative;
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid rgba(227, 126, 111, 0.35);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 40px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
}

.post-accent {
    width: 48px;
    height: 48px;
    background: #e37e6f;
    border-radius: 8px;
    margin-bottom: 18px;
}

h1 {
    font-size: 42px;
    margin-top: 0;
    margin-bottom: 30px;
}

h2 {
    margin-top: 0;
    color: #b85f52;
}

p {
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Welcome 🚀</h1>

<div class="post">
    <div class="post-accent"></div>

    <p>This site is hosted using GitHub Pages.</p>

    <img src="https://picsum.photos/900/400">

    <h2>Video Example</h2>

    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

</div>

</body>
</html>
